<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f0f4f8; min-height: 100vh; }

  /* 로그인 */
  .login-wrap {
    min-height: 100vh; display: flex; justify-content: center; align-items: center;
  }
  .login-box {
    background: #fff; border-radius: 16px; padding: 40px; width: 340px;
    box-shadow: 0 8px 32px rgba(0,0,0,.12); text-align: center;
  }
  .login-box h1 { font-size: 1.5rem; color: #1e3a5f; margin-bottom: 24px; }
  .login-box input {
    width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: 1rem; margin-bottom: 14px;
  }
  .login-box input:focus { outline: none; border-color: #2d6a9f; }

  /* 관리자 레이아웃 */
  .admin-wrap { display: none; }
  .top-bar {
    background: linear-gradient(135deg, #1e3a5f, #2d6a9f);
    color: #fff; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center;
  }
  .top-bar h1 { font-size: 1.2rem; }
  .top-bar button { background: rgba(255,255,255,.2); border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; }

  .tabs { display: flex; background: #fff; border-bottom: 2px solid #e0e0e0; padding: 0 24px; }
  .tab {
    padding: 14px 20px; cursor: pointer; font-weight: 600; color: #888;
    border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s;
  }
  .tab.active { color: #2d6a9f; border-bottom-color: #2d6a9f; }

  .panel { display: none; padding: 28px; max-width: 900px; margin: 0 auto; }
  .panel.active { display: block; }

  .card {
    background: #fff; border-radius: 12px; padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 20px;
  }
  .card h2 { font-size: 1.1rem; color: #1e3a5f; margin-bottom: 18px; border-bottom: 2px solid #e8f0fb; padding-bottom: 10px; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: .85rem; color: #555; margin-bottom: 6px; font-weight: 600; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px;
    font-size: .95rem; font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #2d6a9f; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .btn { padding: 11px 22px; border-radius: 8px; border: none; font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .2s; }
  .btn-primary { background: #2d6a9f; color: #fff; }
  .btn-primary:hover { background: #1e3a5f; }
  .btn-danger { background: #e53935; color: #fff; }
  .btn-danger:hover { background: #b71c1c; }
  .btn-success { background: #388e3c; color: #fff; }
  .btn-success:hover { background: #1b5e20; }
  .btn-sm { padding: 6px 14px; font-size: .82rem; }

  /* 회차 목록 */
  .round-item {
    border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 16px 20px;
    margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;
  }
  .round-item.active-round { border-color: #2d6a9f; background: #e8f0fb; }
  .round-title { font-weight: 700; color: #1e3a5f; }
  .round-meta { font-size: .82rem; color: #888; margin-top: 4px; }
  .badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: .78rem; font-weight: 700;
  }
  .badge-active { background: #e8f5e9; color: #2e7d32; }
  .badge-inactive { background: #f5f5f5; color: #9e9e9e; }

  /* 신청 현황 테이블 */
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th { background: #1e3a5f; color: #fff; padding: 10px 12px; text-align: left; }
  td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
  tr:nth-child(even) td { background: #f8f9fa; }
  tr:hover td { background: #e8f0fb; }

  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-box { background: #fff; border-radius: 10px; padding: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .stat-num { font-size: 2rem; font-weight: 700; color: #2d6a9f; }
  .stat-label { font-size: .82rem; color: #888; margin-top: 4px; }

  .empty { text-align: center; color: #aaa; padding: 32px; }
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <h1>🔐 관리자 로그인</h1>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">로그인</button>
    <p style="margin-top:12px;font-size:.82rem;color:#aaa">firebase-config.js에서 비밀번호를 설정하세요</p>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="admin-wrap" id="admin-wrap">
  <div class="top-bar">
    <h1>⚙️ 신청 시스템 관리자</h1>
    <button onclick="doLogout()">로그아웃</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('rounds')">📋 회차 관리</div>
    <div class="tab" onclick="switchTab('create')">➕ 회차 만들기</div>
    <div class="tab" onclick="switchTab('status')">📊 신청 현황</div>
  </div>

  <!-- 회차 관리 -->
  <div class="panel active" id="panel-rounds">
    <div class="card">
      <h2>회차 목록</h2>
      <div id="rounds-list"><div class="empty">로딩 중...</div></div>
    </div>
  </div>

  <!-- 회차 만들기 -->
  <div class="panel" id="panel-create">
    <div class="card">
      <h2>새 신청 회차 만들기</h2>
      <div class="form-group">
        <label>프로그램 제목 *</label>
        <input type="text" id="c-title" placeholder="예) 2025 면접 일정 신청">
      </div>
      <div class="form-group">
        <label>안내 본문</label>
        <textarea id="c-desc" placeholder="신청자에게 보여줄 안내 내용을 입력하세요.&#10;예) 면접 일정을 선택하여 신청해주세요. 1인 1회만 신청 가능합니다."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>시작 날짜 *</label>
          <input type="date" id="c-start">
        </div>
        <div class="form-group">
          <label>종료 날짜 *</label>
          <input type="date" id="c-end">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>시작 시간 *</label>
          <input type="time" id="c-time-start" value="09:00">
        </div>
        <div class="form-group">
          <label>종료 시간 *</label>
          <input type="time" id="c-time-end" value="17:00">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>시간 간격 (분) *</label>
          <select id="c-interval">
            <option value="10">10분</option>
            <option value="15">15분</option>
            <option value="20">20분</option>
            <option value="30" selected>30분</option>
            <option value="60">60분</option>
          </select>
        </div>
        <div class="form-group">
          <label>점심 시간 제외 (선택)</label>
          <select id="c-lunch">
            <option value="">없음</option>
            <option value="12:00-13:00">12:00 ~ 13:00</option>
            <option value="12:30-13:30">12:30 ~ 13:30</option>
          </select>
        </div>
      </div>
      <div id="slot-preview" style="margin-bottom:16px;display:none">
        <div style="background:#e8f0fb;border-radius:8px;padding:12px 16px;font-size:.88rem;color:#1e3a5f">
          <b>생성될 슬롯 미리보기</b><br><span id="preview-text"></span>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="previewSlots()">슬롯 미리보기</button>
        <button class="btn btn-success" onclick="createRound()">✅ 회차 생성</button>
      </div>
    </div>
  </div>

  <!-- 신청 현황 -->
  <div class="panel" id="panel-status">
    <div class="stat-grid">
      <div class="stat-box"><div class="stat-num" id="stat-total">-</div><div class="stat-label">전체 슬롯</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-booked">-</div><div class="stat-label">신청 완료</div></div>
      <div class="stat-box"><div class="stat-num" id="stat-remain">-</div><div class="stat-label">남은 슬롯</div></div>
    </div>
    <div class="card">
      <h2 id="status-round-title">신청 현황</h2>
      <div style="margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <select id="status-round-select" onchange="loadStatus()" style="padding:8px;border:1.5px solid #ddd;border-radius:6px;font-family:inherit">
          <option value="">회차 선택</option>
        </select>
        <button class="btn btn-success btn-sm" onclick="exportCSV()">📥 CSV 내보내기</button>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>날짜</th><th>시간</th><th>이름</th><th>추가정보</th><th>연락처</th><th>신청시각</th></tr></thead>
          <tbody id="status-tbody"><tr><td colspan="6" class="empty">회차를 선택하세요</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// 로그인
function doLogin() {
  const pw = document.getElementById('pw-input').value;
  if (pw === ADMIN_PASSWORD) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    initAdmin();
  } else {
    alert('비밀번호가 틀렸습니다.');
  }
}
function doLogout() {
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['rounds','create','status'][i] === name);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'status') populateRoundSelect();
}

// 회차 목록
function initAdmin() {
  db.ref('rounds').on('value', snap => {
    const data = snap.val() || {};
    const list = document.getElementById('rounds-list');
    const rounds = Object.entries(data).sort((a,b) => (b[1].createdAt||'').localeCompare(a[1].createdAt||''));
    if (rounds.length === 0) { list.innerHTML = '<div class="empty">생성된 회차가 없습니다.</div>'; return; }
    list.innerHTML = rounds.map(([id, r]) => `
      <div class="round-item ${r.active?'active-round':''}">
        <div>
          <div class="round-title">${r.title} <span class="badge ${r.active?'badge-active':'badge-inactive'}">${r.active?'🟢 활성':'⚫ 비활성'}</span></div>
          <div class="round-meta">생성: ${r.createdAt ? r.createdAt.slice(0,10) : '-'} | 슬롯: ${Object.keys(r.slots||{}).length}개</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${r.active
            ? `<button class="btn btn-sm" style="background:#fff3cd;color:#856404" onclick="toggleActive('${id}',false)">비활성화</button>`
            : `<button class="btn btn-success btn-sm" onclick="toggleActive('${id}',true)">활성화</button>`}
          <button class="btn btn-danger btn-sm" onclick="deleteRound('${id}','${r.title}')">삭제</button>
        </div>
      </div>
    `).join('');
  });
}

function toggleActive(id, val) {
  if (val) {
    // 다른 회차 모두 비활성화 후 활성화
    db.ref('rounds').once('value', snap => {
      const updates = {};
      snap.forEach(child => { updates[`rounds/${child.key}/active`] = false; });
      updates[`rounds/${id}/active`] = true;
      db.ref().update(updates);
    });
  } else {
    db.ref(`rounds/${id}/active`).set(false);
  }
}

function deleteRound(id, title) {
  if (!confirm(`"${title}" 회차를 삭제하시겠습니까?
모든 신청 데이터가 삭제됩니다.`)) return;
  db.ref(`rounds/${id}`).remove();
}

// 슬롯 생성
function generateSlots(startDate, endDate, timeStart, timeEnd, interval, lunch) {
  const slots = {};
  const sd = new Date(startDate), ed = new Date(endDate);
  for (let d = new Date(sd); d <= ed; d.setDate(d.getDate()+1)) {
    const dateStr = d.toISOString().slice(0,10);
    let [sh, sm] = timeStart.split(':').map(Number);
    const [eh, em] = timeEnd.split(':').map(Number);
    let lunchStart = null, lunchEnd = null;
    if (lunch) {
      [lunchStart, lunchEnd] = lunch.split('-').map(t => { const [hh,mm] = t.split(':').map(Number); return hh*60+mm; });
    }
    while (sh*60+sm < eh*60+em) {
      const totalMin = sh*60+sm;
      const timeStr = `${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}`;
      if (!lunchStart || totalMin < lunchStart || totalMin >= lunchEnd) {
        const key = `${dateStr}_${timeStr.replace(':','')}`;
        slots[key] = { date: dateStr, time: timeStr, booked: false };
      }
      sm += parseInt(interval);
      if (sm >= 60) { sh += Math.floor(sm/60); sm = sm%60; }
    }
  }
  return slots;
}

function previewSlots() {
  const startDate = document.getElementById('c-start').value;
  const endDate   = document.getElementById('c-end').value;
  const tStart    = document.getElementById('c-time-start').value;
  const tEnd      = document.getElementById('c-time-end').value;
  const interval  = document.getElementById('c-interval').value;
  const lunch     = document.getElementById('c-lunch').value;
  if (!startDate || !endDate || !tStart || !tEnd) { alert('날짜와 시간을 모두 입력하세요.'); return; }
  const slots = generateSlots(startDate, endDate, tStart, tEnd, interval, lunch);
  const cnt = Object.keys(slots).length;
  const dates = [...new Set(Object.values(slots).map(s=>s.date))].length;
  document.getElementById('preview-text').textContent =
    `총 ${dates}일 × 슬롯 ${cnt}개 생성 예정`;
  document.getElementById('slot-preview').style.display = 'block';
}

function createRound() {
  const title   = document.getElementById('c-title').value.trim();
  const desc    = document.getElementById('c-desc').value.trim();
  const startDate = document.getElementById('c-start').value;
  const endDate   = document.getElementById('c-end').value;
  const tStart  = document.getElementById('c-time-start').value;
  const tEnd    = document.getElementById('c-time-end').value;
  const interval  = document.getElementById('c-interval').value;
  const lunch     = document.getElementById('c-lunch').value;
  if (!title || !startDate || !endDate || !tStart || !tEnd) {
    alert('제목, 날짜, 시간을 모두 입력해주세요.'); return;
  }
  const slots = generateSlots(startDate, endDate, tStart, tEnd, interval, lunch);
  const round = {
    title, description: desc,
    active: false, createdAt: new Date().toISOString(), slots
  };
  db.ref('rounds').push(round).then(() => {
    alert(`✅ 회차가 생성되었습니다! (슬롯 ${Object.keys(slots).length}개)
회차 관리에서 활성화해주세요.`);
    switchTab('rounds');
  });
}

// 현황
function populateRoundSelect() {
  db.ref('rounds').once('value', snap => {
    const sel = document.getElementById('status-round-select');
    const data = snap.val() || {};
    const opts = Object.entries(data).sort((a,b)=>(b[1].createdAt||'').localeCompare(a[1].createdAt||''));
    sel.innerHTML = '<option value="">회차 선택</option>' +
      opts.map(([id,r]) => `<option value="${id}">${r.title}${r.active?' 🟢':''}</option>`).join('');
    // 활성 회차 자동 선택
    const active = opts.find(([,r]) => r.active);
    if (active) { sel.value = active[0]; loadStatus(); }
  });
}

let statusListener = null;
function loadStatus() {
  const id = document.getElementById('status-round-select').value;
  if (!id) return;
  if (statusListener) statusListener();
  statusListener = db.ref(`rounds/${id}/slots`).on('value', snap => {
    const slots = snap.val() || {};
    const all = Object.values(slots);
    const booked = all.filter(s => s.booked);
    document.getElementById('stat-total').textContent  = all.length;
    document.getElementById('stat-booked').textContent = booked.length;
    document.getElementById('stat-remain').textContent = all.length - booked.length;
    const tbody = document.getElementById('status-tbody');
    if (booked.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty">아직 신청자가 없습니다.</td></tr>';
      return;
    }
    booked.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));
    tbody.innerHTML = booked.map(s => `
      <tr>
        <td>${s.date}</td><td>${s.time}</td>
        <td>${s.bookedBy||'-'}</td><td>${s.bookedExtra||'-'}</td>
        <td>${s.bookedContact||'-'}</td>
        <td>${s.bookedAt ? s.bookedAt.slice(0,19).replace('T',' ') : '-'}</td>
      </tr>
    `).join('');
  });
}

function exportCSV() {
  const tbody = document.getElementById('status-tbody');
  const rows = [...tbody.querySelectorAll('tr')].map(tr =>
    [...tr.querySelectorAll('td')].map(td => `"${td.textContent}"`).join(',')
  ).filter(r => !r.includes('아직'));
  if (!rows.length) { alert('내보낼 데이터가 없습니다.'); return; }
  const header = '"날짜","시간","이름","추가정보","연락처","신청시각"';
  const csv = '﻿' + [header, ...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `신청현황_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
</body>
</html>
