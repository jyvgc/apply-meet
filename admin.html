<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 페이지</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background: #f0f4f8; min-height: 100vh; }
  .login-wrap { min-height: 100vh; display: flex; justify-content: center; align-items: center; }
  .login-box { background: #fff; border-radius: 16px; padding: 40px; width: 340px; box-shadow: 0 8px 32px rgba(0,0,0,.12); text-align: center; }
  .login-box h1 { font-size: 1.5rem; color: #1e3a5f; margin-bottom: 24px; }
  .login-box input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; margin-bottom: 14px; }
  .login-box input:focus { outline: none; border-color: #2d6a9f; }
  .admin-wrap { display: none; }
  .top-bar { background: linear-gradient(135deg, #1e3a5f, #2d6a9f); color: #fff; padding: 16px 28px; display: flex; justify-content: space-between; align-items: center; }
  .top-bar h1 { font-size: 1.2rem; }
  .top-bar button { background: rgba(255,255,255,.2); border: none; color: #fff; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
  .tabs { display: flex; background: #fff; border-bottom: 2px solid #e0e0e0; padding: 0 24px; }
  .tab { padding: 14px 20px; cursor: pointer; font-weight: 600; color: #888; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; }
  .tab.active { color: #2d6a9f; border-bottom-color: #2d6a9f; }
  .panel { display: none; padding: 28px; max-width: 960px; margin: 0 auto; }
  .panel.active { display: block; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 20px; }
  .card h2 { font-size: 1.1rem; color: #1e3a5f; margin-bottom: 18px; border-bottom: 2px solid #e8f0fb; padding-bottom: 10px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: .85rem; color: #555; margin-bottom: 6px; font-weight: 600; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: .95rem; font-family: inherit;
  }
  .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #2d6a9f; }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .btn { padding: 11px 22px; border-radius: 8px; border: none; font-size: .95rem; font-weight: 700; cursor: pointer; transition: all .2s; }
  .btn-primary { background: #2d6a9f; color: #fff; }
  .btn-primary:hover { background: #1e3a5f; }
  .btn-warning { background: #f57c00; color: #fff; }
  .btn-warning:hover { background: #e65100; }
  .btn-danger { background: #e53935; color: #fff; }
  .btn-danger:hover { background: #b71c1c; }
  .btn-success { background: #388e3c; color: #fff; }
  .btn-success:hover { background: #1b5e20; }
  .btn-link { background: #e8f0fb; color: #2d6a9f; }
  .btn-link:hover { background: #2d6a9f; color: #fff; }
  .btn-sm { padding: 6px 14px; font-size: .82rem; }
  .round-item { border: 1.5px solid #e0e0e0; border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; }
  .round-item.active-round { border-color: #2d6a9f; background: #e8f0fb; }
  .round-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
  .round-title { font-weight: 700; color: #1e3a5f; font-size: 1rem; }
  .round-meta { font-size: .82rem; color: #888; margin-top: 4px; }
  .round-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: .78rem; font-weight: 700; }
  .badge-active { background: #e8f5e9; color: #2e7d32; }
  .badge-inactive { background: #f5f5f5; color: #9e9e9e; }
  /* 편집 영역 */
  .edit-area { display: none; margin-top: 16px; padding-top: 16px; border-top: 1px solid #e0e0e0; }
  .edit-area.open { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: .88rem; }
  th { background: #1e3a5f; color: #fff; padding: 10px 12px; text-align: left; }
  td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; }
  tr:nth-child(even) td { background: #f8f9fa; }
  tr:hover td { background: #e8f0fb; }
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
  .stat-box { background: #fff; border-radius: 10px; padding: 18px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
  .stat-num { font-size: 2rem; font-weight: 700; color: #2d6a9f; }
  .stat-label { font-size: .82rem; color: #888; margin-top: 4px; }
  .empty { text-align: center; color: #aaa; padding: 32px; }
  .round-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .round-select-btn {
    padding: 14px 16px; border-radius: 10px; border: 2px solid #ddd; background: #fff;
    cursor: pointer; text-align: left; transition: all .2s;
  }
  .round-select-btn:hover { border-color: #2d6a9f; background: #e8f0fb; }
  .round-select-btn.selected { border-color: #2d6a9f; background: #e8f0fb; }
  .round-select-btn .rtitle { font-weight: 700; color: #1e3a5f; font-size: .95rem; }
  .round-select-btn .rmeta { font-size: .78rem; color: #888; margin-top: 4px; }
  .preview-box { background: #e8f0fb; border-radius: 8px; padding: 12px 16px; font-size: .88rem; color: #1e3a5f; margin-bottom: 16px; display: none; }
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="login-wrap">
  <div class="login-box">
    <h1>🔐 관리자 로그인</h1>
    <input type="password" id="pw-input" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" style="width:100%" onclick="doLogin()">로그인</button>
  </div>
</div>

<!-- 관리자 패널 -->
<div class="admin-wrap" id="admin-wrap">
  <div class="top-bar">
    <h1>⚙️ 신청 시스템 관리자</h1>
    <button onclick="doLogout()">로그아웃</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('rounds')">📋 회차 관리</div>
    <div class="tab" onclick="switchTab('create')">➕ 회차 만들기</div>
    <div class="tab" onclick="switchTab('status')">📊 신청 현황</div>
  </div>

  <!-- ① 회차 관리 -->
  <div class="panel active" id="panel-rounds">
    <div class="card">
      <h2>회차 목록</h2>
      <div id="rounds-list"><div class="empty">로딩 중...</div></div>
    </div>
  </div>

  <!-- ② 회차 만들기 -->
  <div class="panel" id="panel-create">
    <div class="card">
      <h2>새 신청 회차 만들기</h2>
      <div class="form-group"><label>프로그램 제목 *</label><input type="text" id="c-title" placeholder="예) 2025 면접 일정 신청"></div>
      <div class="form-group"><label>안내 본문</label><textarea id="c-desc" placeholder="신청자에게 보여줄 안내 내용을 입력하세요."></textarea></div>
      <div class="form-row">
        <div class="form-group"><label>시작 날짜 *</label><input type="date" id="c-start"></div>
        <div class="form-group"><label>종료 날짜 *</label><input type="date" id="c-end"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>시작 시간 *</label><input type="time" id="c-time-start" value="09:00"></div>
        <div class="form-group"><label>종료 시간 *</label><input type="time" id="c-time-end" value="17:00"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>시간 간격 (분) *</label>
          <select id="c-interval">
            <option value="10">10분</option><option value="15">15분</option>
            <option value="20">20분</option><option value="30" selected>30분</option><option value="60">60분</option>
          </select>
        </div>
        <div class="form-group"><label>점심 시간 제외</label>
          <select id="c-lunch">
            <option value="">없음</option>
            <option value="12:00-13:00">12:00 ~ 13:00</option>
            <option value="12:30-13:30">12:30 ~ 13:30</option>
          </select>
        </div>
      </div>
      <div class="preview-box" id="slot-preview"><b>생성될 슬롯 미리보기</b><br><span id="preview-text"></span></div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="previewSlots()">슬롯 미리보기</button>
        <button class="btn btn-success" onclick="createRound()">✅ 회차 생성</button>
      </div>
    </div>
  </div>

  <!-- ③ 신청 현황 -->
  <div class="panel" id="panel-status">
    <p class="section-label" style="font-size:1rem;font-weight:700;color:#1e3a5f;margin-bottom:14px">회차를 선택하세요</p>
    <div class="round-select-grid" id="status-round-grid"></div>
    <div id="status-content" style="display:none">
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-num" id="stat-total">-</div><div class="stat-label">전체 슬롯</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-booked">-</div><div class="stat-label">신청 완료</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-remain">-</div><div class="stat-label">남은 슬롯</div></div>
      </div>
      <div class="card">
        <h2 id="status-round-title">신청 현황</h2>
        <div style="margin-bottom:14px">
          <button class="btn btn-success btn-sm" onclick="exportCSV()">📥 CSV 내보내기</button>
        </div>
        <div style="overflow-x:auto">
          <table>
            <thead><tr><th>날짜</th><th>시간</th><th>이름</th><th>추가정보</th><th>연락처</th><th>신청시각</th></tr></thead>
            <tbody id="status-tbody"><tr><td colspan="6" class="empty">회차를 선택하세요</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 회차 편집 모달 -->
<div style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;justify-content:center;align-items:center;padding:16px" id="edit-overlay" onclick="if(event.target===this)closeEditModal()">
  <div style="background:#fff;border-radius:16px;padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)">
    <h2 style="font-size:1.2rem;color:#1e3a5f;margin-bottom:20px">✏️ 회차 수정</h2>
    <div class="form-group"><label>프로그램 제목 *</label><input type="text" id="e-title"></div>
    <div class="form-group"><label>안내 본문</label><textarea id="e-desc"></textarea></div>
    <p style="font-size:.85rem;color:#888;margin-bottom:16px">※ 시간 슬롯은 아래에서 재생성하면 기존 신청 데이터가 초기화됩니다.</p>
    <details style="margin-bottom:16px">
      <summary style="cursor:pointer;font-size:.9rem;font-weight:700;color:#e65100;padding:8px 0">🔄 시간 슬롯 재생성 (선택사항 — 기존 신청 초기화됨)</summary>
      <div style="padding-top:14px">
        <div class="form-row">
          <div class="form-group"><label>시작 날짜</label><input type="date" id="e-start"></div>
          <div class="form-group"><label>종료 날짜</label><input type="date" id="e-end"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>시작 시간</label><input type="time" id="e-time-start" value="09:00"></div>
          <div class="form-group"><label>종료 시간</label><input type="time" id="e-time-end" value="17:00"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>시간 간격(분)</label>
            <select id="e-interval">
              <option value="10">10분</option><option value="15">15분</option>
              <option value="20">20분</option><option value="30" selected>30분</option><option value="60">60분</option>
            </select>
          </div>
          <div class="form-group"><label>점심 제외</label>
            <select id="e-lunch">
              <option value="">없음</option>
              <option value="12:00-13:00">12:00~13:00</option>
              <option value="12:30-13:30">12:30~13:30</option>
            </select>
          </div>
        </div>
        <label style="display:flex;align-items:center;gap:8px;font-size:.88rem;color:#e65100;cursor:pointer;margin-bottom:8px">
          <input type="checkbox" id="e-regen"> 슬롯 재생성 (체크 시 기존 신청 데이터 초기화)
        </label>
      </div>
    </details>
    <div style="display:flex;gap:10px">
      <button class="btn btn-secondary" style="flex:1;background:#f0f0f0;color:#555" onclick="closeEditModal()">취소</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<script>
let editingRoundId = null;
let statusListener = null;
let selectedStatusRound = null;

function doLogin() {
  if (document.getElementById('pw-input').value === ADMIN_PASSWORD) {
    document.getElementById('login-wrap').style.display = 'none';
    document.getElementById('admin-wrap').style.display = 'block';
    initAdmin();
  } else { alert('비밀번호가 틀렸습니다.'); }
}
function doLogout() {
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('admin-wrap').style.display = 'none';
  document.getElementById('pw-input').value = '';
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['rounds','create','status'][i]===name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`panel-${name}`).classList.add('active');
  if (name === 'status') renderStatusRoundGrid();
}

// ── 회차 목록 ──────────────────────────────────────────────
function initAdmin() {
  db.ref('rounds').on('value', snap => {
    const data = snap.val() || {};
    const list = document.getElementById('rounds-list');
    const rounds = Object.entries(data).sort((a,b)=>(b[1].createdAt||'').localeCompare(a[1].createdAt||''));
    if (!rounds.length) { list.innerHTML = '<div class="empty">생성된 회차가 없습니다.</div>'; return; }
    list.innerHTML = rounds.map(([id, r]) => `
      <div class="round-item ${r.active?'active-round':''}" id="ri-${id}">
        <div class="round-header">
          <div>
            <div class="round-title">${r.title} <span class="badge ${r.active?'badge-active':'badge-inactive'}">${r.active?'🟢 활성':'⚫ 비활성'}</span></div>
            <div class="round-meta">생성: ${(r.createdAt||'').slice(0,10)} | 슬롯: ${Object.keys(r.slots||{}).length}개 | 신청: ${Object.values(r.slots||{}).filter(s=>s.booked).length}명</div>
          </div>
          <div class="round-actions">
            ${r.active
              ? `<a href="index.html" target="_blank" class="btn btn-link btn-sm">🔗 신청 페이지</a>
                 <button class="btn btn-sm" style="background:#fff3cd;color:#856404" onclick="toggleActive('${id}',false)">비활성화</button>`
              : `<button class="btn btn-success btn-sm" onclick="toggleActive('${id}',true)">활성화</button>`}
            <button class="btn btn-warning btn-sm" onclick="openEditModal('${id}')">✏️ 수정</button>
            <button class="btn btn-danger btn-sm" onclick="deleteRound('${id}','${r.title.replace(/'/g,"\'")}')">삭제</button>
          </div>
        </div>
      </div>
    `).join('');
  });
}

function toggleActive(id, val) {
  db.ref('rounds').once('value', snap => {
    const updates = {};
    snap.forEach(c => { updates[`rounds/${c.key}/active`] = false; });
    if (val) updates[`rounds/${id}/active`] = true;
    db.ref().update(updates);
  });
}
function deleteRound(id, title) {
  if (!confirm(`"${title}" 회차를 삭제하시겠습니까?
모든 데이터가 삭제됩니다.`)) return;
  db.ref(`rounds/${id}`).remove();
}

// ── 회차 수정 모달 ──────────────────────────────────────────
function openEditModal(id) {
  editingRoundId = id;
  db.ref(`rounds/${id}`).once('value', snap => {
    const r = snap.val();
    document.getElementById('e-title').value = r.title || '';
    document.getElementById('e-desc').value = r.description || '';
    document.getElementById('e-regen').checked = false;
    document.getElementById('edit-overlay').style.display = 'flex';
  });
}
function closeEditModal() { document.getElementById('edit-overlay').style.display = 'none'; editingRoundId = null; }

function saveEdit() {
  const title = document.getElementById('e-title').value.trim();
  if (!title) { alert('제목을 입력하세요.'); return; }
  const desc  = document.getElementById('e-desc').value.trim();
  const regen = document.getElementById('e-regen').checked;
  const updates = { title, description: desc };
  if (regen) {
    const start = document.getElementById('e-start').value;
    const end   = document.getElementById('e-end').value;
    const ts    = document.getElementById('e-time-start').value;
    const te    = document.getElementById('e-time-end').value;
    const iv    = document.getElementById('e-interval').value;
    const ln    = document.getElementById('e-lunch').value;
    if (!start||!end||!ts||!te) { alert('슬롯 재생성을 위해 날짜와 시간을 모두 입력하세요.'); return; }
    if (!confirm('기존 신청 데이터가 모두 초기화됩니다. 계속하시겠습니까?')) return;
    updates.slots = generateSlots(start, end, ts, te, iv, ln);
  }
  db.ref(`rounds/${editingRoundId}`).update(updates).then(() => {
    alert('✅ 수정되었습니다.');
    closeEditModal();
  });
}

// ── 슬롯 생성 ──────────────────────────────────────────────
function generateSlots(startDate, endDate, timeStart, timeEnd, interval, lunch) {
  const slots = {};
  const sd = new Date(startDate), ed = new Date(endDate);
  let lStart=null, lEnd=null;
  if (lunch) { [lStart,lEnd]=lunch.split('-').map(t=>{ const [h,m]=t.split(':').map(Number); return h*60+m; }); }
  for (let d=new Date(sd); d<=ed; d.setDate(d.getDate()+1)) {
    const dateStr = d.toISOString().slice(0,10);
    let [sh,sm] = timeStart.split(':').map(Number);
    const [eh,em] = timeEnd.split(':').map(Number);
    while (sh*60+sm < eh*60+em) {
      const tot = sh*60+sm;
      const ts = `${String(sh).padStart(2,'0')}:${String(sm).padStart(2,'0')}`;
      if (!lStart || tot<lStart || tot>=lEnd) {
        slots[`${dateStr}_${ts.replace(':','')}`] = { date:dateStr, time:ts, booked:false };
      }
      sm += parseInt(interval);
      if (sm>=60) { sh+=Math.floor(sm/60); sm=sm%60; }
    }
  }
  return slots;
}

function previewSlots() {
  const start=document.getElementById('c-start').value, end=document.getElementById('c-end').value;
  const ts=document.getElementById('c-time-start').value, te=document.getElementById('c-time-end').value;
  const iv=document.getElementById('c-interval').value, ln=document.getElementById('c-lunch').value;
  if (!start||!end||!ts||!te) { alert('날짜와 시간을 모두 입력하세요.'); return; }
  const slots=generateSlots(start,end,ts,te,iv,ln);
  const cnt=Object.keys(slots).length;
  const days=[...new Set(Object.values(slots).map(s=>s.date))].length;
  document.getElementById('preview-text').textContent=`총 ${days}일 × ${cnt}개 슬롯 생성 예정`;
  document.getElementById('slot-preview').style.display='block';
}

function createRound() {
  const title=document.getElementById('c-title').value.trim();
  const desc=document.getElementById('c-desc').value.trim();
  const start=document.getElementById('c-start').value, end=document.getElementById('c-end').value;
  const ts=document.getElementById('c-time-start').value, te=document.getElementById('c-time-end').value;
  const iv=document.getElementById('c-interval').value, ln=document.getElementById('c-lunch').value;
  if (!title||!start||!end||!ts||!te) { alert('제목, 날짜, 시간을 모두 입력해주세요.'); return; }
  const slots=generateSlots(start,end,ts,te,iv,ln);
  db.ref('rounds').push({ title, description:desc, active:false, createdAt:new Date().toISOString(), slots })
    .then(()=>{ alert(`✅ 회차 생성 완료! (슬롯 ${Object.keys(slots).length}개)
회차 관리에서 활성화해주세요.`); switchTab('rounds'); });
}

// ── 신청 현황 ──────────────────────────────────────────────
function renderStatusRoundGrid() {
  db.ref('rounds').once('value', snap => {
    const data = snap.val() || {};
    const grid = document.getElementById('status-round-grid');
    const rounds = Object.entries(data).sort((a,b)=>(b[1].createdAt||'').localeCompare(a[1].createdAt||''));
    if (!rounds.length) { grid.innerHTML = '<div style="color:#aaa">회차가 없습니다.</div>'; return; }
    grid.innerHTML = rounds.map(([id, r]) => {
      const booked = Object.values(r.slots||{}).filter(s=>s.booked).length;
      const total  = Object.keys(r.slots||{}).length;
      return `<button class="round-select-btn ${selectedStatusRound===id?'selected':''}" onclick="selectStatusRound('${id}','${r.title.replace(/'/g,"\'")}')">
        <div class="rtitle">${r.title} ${r.active?'🟢':''}</div>
        <div class="rmeta">신청 ${booked}/${total}명</div>
      </button>`;
    }).join('');
    // 활성 회차 자동 선택 (처음 진입 시)
    if (!selectedStatusRound) {
      const active = rounds.find(([,r])=>r.active);
      if (active) selectStatusRound(active[0], active[1].title);
    }
  });
}

function selectStatusRound(id, title) {
  selectedStatusRound = id;
  // 버튼 선택 표시 갱신
  document.querySelectorAll('.round-select-btn').forEach(b => b.classList.remove('selected'));
  event && event.currentTarget && event.currentTarget.classList.add('selected');
  document.getElementById('status-content').style.display = 'block';
  document.getElementById('status-round-title').textContent = `📊 ${title} — 신청 현황`;
  if (statusListener) { db.ref().off('value', statusListener); statusListener=null; }
  statusListener = db.ref(`rounds/${id}/slots`).on('value', snap => {
    const slots = snap.val() || {};
    const all = Object.values(slots);
    const booked = all.filter(s=>s.booked).sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
    document.getElementById('stat-total').textContent  = all.length;
    document.getElementById('stat-booked').textContent = booked.length;
    document.getElementById('stat-remain').textContent = all.length-booked.length;
    const tbody = document.getElementById('status-tbody');
    if (!booked.length) { tbody.innerHTML='<tr><td colspan="6" class="empty">아직 신청자가 없습니다.</td></tr>'; return; }
    tbody.innerHTML = booked.map(s=>`
      <tr>
        <td>${s.date}</td><td>${s.time}</td><td>${s.bookedBy||'-'}</td>
        <td>${s.bookedExtra||'-'}</td><td>${s.bookedContact||'-'}</td>
        <td>${(s.bookedAt||'').slice(0,19).replace('T',' ')}</td>
      </tr>`).join('');
  });
}

function exportCSV() {
  const tbody = document.getElementById('status-tbody');
  const rows = [...tbody.querySelectorAll('tr')].map(tr =>
    [...tr.querySelectorAll('td')].map(td=>`"${td.textContent}"`).join(',')
  ).filter(r=>!r.includes('아직')&&!r.includes('회차'));
  if (!rows.length) { alert('내보낼 데이터가 없습니다.'); return; }
  const header = '"날짜","시간","이름","추가정보","연락처","신청시각"';
  const csv = '\uFEFF'+[header,...rows].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = `신청현황_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}
</script>
